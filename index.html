      flex-direction: column;
      justify-content: center;

      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      transition: background 1.5s, color 1.5s;
      overflow: hidden;

    body.day {

      color: #222;
    }

    body.night {
      background: #050505;
      color: #eee;
    }

    img {
      max-width: 90vw;
      max-height: 75vh;
      object-fit: contain;
      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    p {
      margin-top: 20px;
      font-size: 1.15em;
      max-width: 90%;
      min-height: 1.5em;
      opacity: 0;
      animation: fadeIn 2.5s forwards;
      animation-delay: 0.5s;
    }

    @keyframes fadeIn {

    const message = chosen.text;

    function typeText() {
      if (i < message.length) {
        textEl.textContent += message.charAt(i);
        i++;
        setTimeout(typeText, 45);
      }
    }

    // ===============================
    // 🎮 MINIGAME LOGIC (toegevoegd)
    // ===============================
    const openGameBtn = document.getElementById("openGame");
    const overlay = document.getElementById("gameOverlay");
    const startBtn = document.getElementById("startGame");
    const countdownEl = document.getElementById("countdown");
    const gameArea = document.getElementById("gameArea");
    const input = document.getElementById("answerInput");
    const answersDiv = document.getElementById("answers");
    const timerEl = document.getElementById("timer");
    const resultEl = document.getElementById("result");
    const intro = document.getElementById("gameIntro");

    let timeLeft = 60;
    let timerInterval;
    let answers = [];

    function resetGameUI() {
      clearInterval(timerInterval);
      timeLeft = 60;
      answers = [];
      answersDiv.innerHTML = "";
      input.value = "";
      input.disabled = false;
      resultEl.textContent = "";
      gameArea.style.display = "none";
      intro.style.display = "block";
      countdownEl.style.display = "none";
      timerEl.textContent = "60";
    }

    openGameBtn.onclick = () => {
      resetGameUI();
      overlay.style.display = "flex";
    };

    // Sluit met klik buiten inhoud
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) {
        overlay.style.display = "none";
        resetGameUI();
      }
    });

    // Sluit met ESC
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && overlay.style.display !== "none") {
        overlay.style.display = "none";
        resetGameUI();
      }
    });

    startBtn.onclick = () => {
      intro.style.display = "none";
      countdownEl.style.display = "block";

      let count = 3;
      countdownEl.textContent = count;

      const cd = setInterval(() => {
        count--;
        if (count > 0) {
          countdownEl.textContent = count;
        } else {
          clearInterval(cd);
          countdownEl.style.display = "none";
          startGame();
        }
      }, 1000);
    };

    function startGame() {
      gameArea.style.display = "block";
      input.focus();
      timerEl.textContent = timeLeft;

      timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          endGame();
        }
      }, 1000);
    }

    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && input.value.trim() !== "") {
        const val = input.value.trim();

        if (!answers.includes(val.toLowerCase())) {
          answers.push(val.toLowerCase());

          const bubble = document.createElement("div");
          bubble.textContent = val;
          bubble.style.padding = "6px 10px";
          bubble.style.background = "white";
          bubble.style.color = "black";
          bubble.style.borderRadius = "15px";
          bubble.style.fontSize = "14px";

          answersDiv.appendChild(bubble);
        }

        input.value = "";
      }
    });

    function endGame() {
      input.disabled = true;

      if (answers.length >= 10) {
        launchConfetti();
        resultEl.textContent = "Gefeliciteerd, je hebt een date gewonnen! 💖";
      } else {
        resultEl.textContent = "Helaas, je hebt niet gewonnen, maar ik neem je alsnog mee op date zodat je wel 1 plekje meer weet :).";
      }
    }

    // 🎉 Simpele confetti
    function launchConfetti() {
      for (let i = 0; i < 80; i++) {
        const conf = document.createElement("div");
        conf.style.position = "fixed";
        conf.style.width = "8px";
        conf.style.height = "8px";
        conf.style.background = `hsl(${Math.random()*360}, 100%, 50%)`;
        conf.style.top = "0px";
        conf.style.left = Math.random() * window.innerWidth + "px";
        conf.style.opacity = "0.8";
        conf.style.zIndex = "9999";

        document.body.appendChild(conf);

        let fall = setInterval(() => {
          conf.style.top = (parseFloat(conf.style.top) + 5) + "px";
          if (parseFloat(conf.style.top) > window.innerHeight) {
            clearInterval(fall);
            conf.remove();
          }
        }, 20);
      }
    }
    // ===============================
    // EINDE MINIGAME LOGIC
    // ===============================
